<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChaosTCG 一人回し</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<div id="fields">

<!-- P2 (opponent) -->
<div class="field" id="field-1">
<div class="playmat">
  <div class="mat-left">
    <div class="zone" data-p="1" data-zone="extra" onclick="game.showZone(1,'extra')"><span class="zone-label">EX</span><span class="zone-count" id="p1-extra-count">0</span></div>
    <div class="zone" data-p="1" data-zone="deck" onclick="game.showZone(1,'deck')" oncontextmenu="deckMenu(event,1)"><span class="zone-label">デッキ</span><span class="zone-count" id="p1-deck-count">0</span></div>
  </div>
  <div class="mat-center">
    <div class="hand-area" id="p1-hand-area">
      <span class="zone-label">相手手札 (<span id="p1-hand-count">0</span>)</span>
      <div class="card-row" id="p1-hand-cards"></div>
    </div>
    <div class="stage-row back-row">
      <div class="slot" data-p="1" data-slot="back-l" id="p1-back-l"></div>
      <div class="slot partner-slot" data-p="1" data-slot="partner" id="p1-partner"></div>
      <div class="slot" data-p="1" data-slot="back-r" id="p1-back-r"></div>
    </div>
    <div class="stage-row front-row">
      <div class="slot" data-p="1" data-slot="front-l" id="p1-front-l"></div>
      <div class="slot" style="visibility:hidden;width:calc(var(--cw) + 16px)"></div>
      <div class="slot" data-p="1" data-slot="front-r" id="p1-front-r"></div>
    </div>
  </div>
  <div class="mat-right">
    <div class="zone" data-p="1" data-zone="backyard"><span class="zone-label">バックヤード</span><span class="zone-count" id="p1-backyard-count">0</span></div>
    <div class="zone" data-p="1" data-zone="discard" onclick="game.showZone(1,'discard')" oncontextmenu="zoneMenu(event,1,'discard')"><span class="zone-label">控え室</span><span class="zone-count" id="p1-discard-count">0</span></div>
  </div>
</div>
</div>

<!-- P0 (self) -->
<div class="field" id="field-0">
<div class="playmat">
  <div class="mat-left">
    <div class="zone" data-p="0" data-zone="extra" onclick="game.showZone(0,'extra')"><span class="zone-label">EX</span><span class="zone-count" id="p0-extra-count">0</span></div>
    <div class="zone" data-p="0" data-zone="deck" onclick="game.showZone(0,'deck')" oncontextmenu="deckMenu(event,0)"><span class="zone-label">デッキ</span><span class="zone-count" id="p0-deck-count">0</span></div>
  </div>
  <div class="mat-center">
    <div class="stage-row front-row">
      <div class="slot" data-p="0" data-slot="front-l" id="p0-front-l"></div>
      <div class="slot" style="visibility:hidden;width:calc(var(--cw) + 16px)"></div>
      <div class="slot" data-p="0" data-slot="front-r" id="p0-front-r"></div>
    </div>
    <div class="stage-row back-row">
      <div class="slot" data-p="0" data-slot="back-l" id="p0-back-l"></div>
      <div class="slot partner-slot" data-p="0" data-slot="partner" id="p0-partner"></div>
      <div class="slot" data-p="0" data-slot="back-r" id="p0-back-r"></div>
    </div>
    <div class="hand-area" id="p0-hand-area">
      <span class="zone-label">手札 (<span id="p0-hand-count">0</span>)</span>
      <div class="card-row" id="p0-hand-cards"></div>
    </div>
  </div>
  <div class="mat-right">
    <div class="zone" data-p="0" data-zone="backyard"><span class="zone-label">バックヤード</span><span class="zone-count" id="p0-backyard-count">0</span></div>
    <div class="zone" data-p="0" data-zone="discard" onclick="game.showZone(0,'discard')" oncontextmenu="zoneMenu(event,0,'discard')"><span class="zone-label">控え室</span><span class="zone-count" id="p0-discard-count">0</span></div>
  </div>
</div>
</div>

</div>
</div>

<!-- Right panel -->
<div class="side-panel">
  <div class="action-buttons">
    <button onclick="resetGame()">リセット</button>
  </div>
  <div class="log" id="log"></div>
</div>

<!-- Zone panel -->
<div id="zone-panel" class="zone-panel" style="display:none">
  <div class="zone-panel-header"><span id="zone-panel-title"></span><button onclick="closeZonePanel()">✕</button></div>
  <div class="card-row" id="zone-panel-cards"></div>
</div>

<!-- Context menu -->
<div id="ctx-menu" class="context-menu" style="display:none"></div>

<!-- Deck select modal -->
<div id="deck-modal" class="modal">
  <div class="modal-content">
    <h2>デッキ選択</h2>
    <div><label>P1:</label><select id="deck-select-0"></select></div>
    <div><label>P2:</label><select id="deck-select-1"></select></div>
    <button onclick="startGame()">ゲーム開始</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
