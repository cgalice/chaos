<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChaosTCG デッキレシピデータベース</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a2332; color: #e8f0ff; font-family: sans-serif; padding: 16px; }
h1 { color: #4a9fd4; margin-bottom: 12px; font-size: 1.4em; }
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.filters select, .filters input { background: #253345; color: #e8f0ff; border: 1px solid #3a5a7d; border-radius: 4px; padding: 6px 10px; font-size: 13px; }
.filters button { background: #3a7bd5; color: #fff; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
.filters button:hover { background: #4a9fd4; }
.stats { font-size: 12px; color: #8ab; margin-bottom: 12px; }
.recipe-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-bottom: 20px; }
.recipe-card { background: #253345; border: 1px solid #3a5a7d; border-radius: 6px; padding: 10px; cursor: pointer; transition: border-color 0.2s; }
.recipe-card:hover { border-color: #4a9fd4; }
.recipe-card .meta { font-size: 11px; color: #8ab; }
.recipe-card .partner { font-size: 13px; font-weight: bold; margin: 4px 0; }
.recipe-card .info { font-size: 12px; }
.recipe-card .comment { font-size: 11px; color: #6a9; margin-top: 4px; font-style: italic; }
.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; overflow-y: auto; padding: 20px; }
.detail-overlay.active { display: block; }
.detail-content { max-width: 1200px; margin: 0 auto; background: #1e2d3d; border-radius: 8px; padding: 20px; }
.detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.detail-header h2 { color: #4a9fd4; font-size: 1.2em; }
.close-btn { background: #555; color: #fff; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; }
.import-btn { background: #2a9d4a; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer; font-size: 13px; margin-top: 12px; }
.import-btn:hover { background: #3ab85a; }
.card-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.card-item { position: relative; width: 100px; }
.card-item img { width: 100%; border-radius: 3px; display: block; }
.card-item .count { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.8); color: #fff; font-size: 11px; font-weight: bold; padding: 1px 5px; border-radius: 3px; }
.card-item .num { font-size: 9px; color: #8ab; text-align: center; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.no-image { width: 100%; aspect-ratio: 5/7; background: #354555; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #678; }
</style>
</head>
<body>
<h1>ChaosTCG デッキレシピデータベース</h1>
<div class="filters">
  <select id="f-year"><option value="">年</option></select>
  <select id="f-event"><option value="">大会種別</option></select>
  <select id="f-location"><option value="">地域</option></select>
  <input id="f-partner" placeholder="パートナー番号">
  <input id="f-player" placeholder="HN">
  <button onclick="applyFilter()">検索</button>
  <button onclick="resetFilter()">リセット</button>
</div>
<div class="stats" id="stats"></div>
<div class="recipe-list" id="list"></div>
<div class="detail-overlay" id="detail" onclick="if(event.target===this)closeDetail()">
  <div class="detail-content" id="detail-content"></div>
</div>
<script>
let recipes = [], cardMap = {}, filtered = [];

async function init() {
  [recipes, cardMap] = await Promise.all([
    fetch('recipes.json').then(r => r.json()),
    fetch('card_map.json').then(r => r.json())
  ]);
  buildFilters();
  filtered = recipes;
  render();
}

function buildFilters() {
  const years = [...new Set(recipes.map(r => r.year).filter(Boolean))].sort();
  const events = [...new Set(recipes.map(r => r.event_type).filter(Boolean))].sort();
  const locs = [...new Set(recipes.map(r => r.location).filter(Boolean))].sort();
  const sel = (id, vals) => { const el = document.getElementById(id); vals.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); }); };
  sel('f-year', years);
  sel('f-event', events);
  sel('f-location', locs);
}

function applyFilter() {
  const y = document.getElementById('f-year').value;
  const e = document.getElementById('f-event').value;
  const l = document.getElementById('f-location').value;
  const p = document.getElementById('f-partner').value.toUpperCase();
  const pl = document.getElementById('f-player').value;
  filtered = recipes.filter(r =>
    (!y || r.year == y) && (!e || r.event_type === e) && (!l || r.location === l) && (!p || (r.partner && r.partner.includes(p))) && (!pl || (r.player && r.player.includes(pl)))
  );
  render();
}

function resetFilter() {
  document.querySelectorAll('.filters select').forEach(s => s.value = '');
  document.getElementById('f-partner').value = '';
  document.getElementById('f-player').value = '';
  filtered = recipes;
  render();
}

function render() {
  document.getElementById('stats').textContent = `${filtered.length} / ${recipes.length} デッキ`;
  const list = document.getElementById('list');
  const show = filtered.slice(0, 200);
  list.innerHTML = show.map((r, i) => {
    const cm = cardMap[r.partner] || {};
    const name = cm.name || r.partner;
    return `<div class="recipe-card" onclick="showDetail(${filtered.indexOf(r)})">
      <div class="meta">${r.year || '?'}年 ${r.event_type} ${r.location} #${r.rank}</div>
      <div class="partner">${name}</div>
      <div class="info">${r.player || ''} ${r.cards.length}種 ${r.total}枚</div>
      ${r.comment ? `<div class="comment">${r.comment}</div>` : ''}
    </div>`;
  }).join('');
  if (filtered.length > 200) list.innerHTML += `<div style="color:#678;padding:10px">他 ${filtered.length - 200} 件...</div>`;
}

function showDetail(idx, restoreScroll) {
  const r = filtered[idx];
  const cm = cardMap[r.partner] || {};
  const edits = JSON.parse(localStorage.getItem('chaos_recipe_edits') || '{}');
  const cards = edits[r.id] ? edits[r.id].cards : [...r.cards];

  // Split main / EX
  const mainCards = [], exCards = [];
  cards.forEach((c, i) => {
    const info = cardMap[c.number] || {};
    if (info.type === 'extra') exCards.push({...c, _i: i});
    else mainCards.push({...c, _i: i});
  });
  const mainTotal = mainCards.reduce((s,c) => s + c.count, 0);
  const exTotal = exCards.reduce((s,c) => s + c.count, 0);
  const mainCls = mainTotal === 50 ? 'color:#4c8' : mainTotal > 50 ? 'color:#e55' : 'color:#da4';
  const exCls = exTotal === 10 ? 'color:#4c8' : exTotal > 10 ? 'color:#e55' : 'color:#da4';

  let html = `<div class="detail-header"><h2>${r.year||'?'}年 ${r.event_type} ${r.location} #${r.rank}</h2><button class="close-btn" onclick="closeDetail()">✕</button></div>`;
  html += `<p style="margin-bottom:8px;font-size:13px">パートナー: <b>${cm.name||r.partner}</b> (${r.partner})${r.player?' | '+r.player:''} | <span id="totals-display"><span style="${mainCls};font-weight:bold">メイン${mainTotal}/50</span> <span style="${exCls};font-weight:bold">EX${exTotal}/10</span></span></p>`;
  html += `<div style="display:flex;gap:12px;margin-top:8px">`;

  // Left: source image
  html += `<div id="img-pane" style="flex:2;min-width:0;max-height:75vh;overflow:auto;border:1px solid #3a5a7d;border-radius:4px">`;
  if (r.source_img) html += `<img src="${r.source_img}" style="width:100%;display:block">`;
  else html += `<div style="padding:40px;text-align:center;color:#678">画像なし</div>`;
  html += `</div>`;

  // Right: card lists
  html += `<div style="flex:1;min-width:200px;max-width:260px;display:flex;flex-direction:column">`;

  // Main deck
  html += `<div style="font-size:10px;color:#8ab;margin-bottom:2px">メインデッキ <span id="main-count" style="color:${mainCls}">${mainTotal}/50</span></div>`;
  html += `<div id="edit-list" style="flex:1;overflow-y:auto;max-height:40vh">`;
  mainCards.forEach(c => {
    html += cardRow(idx, c._i, c);
  });
  html += `</div>`;

  // EX deck
  html += `<div style="font-size:10px;color:#8ab;margin:6px 0 2px;border-top:1px solid #3a5a7d;padding-top:4px">EXデッキ <span id="ex-count" style="color:${exCls}">${exTotal}/10</span></div>`;
  html += `<div id="edit-list-ex" style="overflow-y:auto;max-height:20vh">`;
  exCards.forEach(c => {
    html += cardRow(idx, c._i, c);
  });
  html += `</div>`;

  // Add + buttons
  html += `<div style="display:flex;gap:3px;margin-top:6px">
    <input id="add-num" placeholder="番号" style="flex:1;background:#0f1a26;border:1px solid #3a5a6a;border-radius:3px;padding:3px 4px;color:#e8f0ff;font-size:11px">
    <input id="add-cnt" type="number" value="1" min="1" max="4" style="width:30px;background:#0f1a26;border:1px solid #3a5a6a;border-radius:3px;padding:3px;color:#e8f0ff;font-size:11px;text-align:center">
    <button onclick="addCard(${idx})" style="background:#3a7bd5;color:#fff;border:none;border-radius:3px;padding:3px 6px;cursor:pointer;font-size:11px">+</button>
  </div>`;
  html += `<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
    <button onclick="saveEdit(${idx})" style="background:#2a9d4a;color:#fff;border:none;border-radius:3px;padding:4px 8px;cursor:pointer;font-size:11px">保存</button>
    <button onclick="resetEdit(${idx})" style="background:#555;color:#fff;border:none;border-radius:3px;padding:4px 8px;cursor:pointer;font-size:11px">リセット</button>
    <button onclick="exportEdits()" style="background:#7a5a2a;color:#fff;border:none;border-radius:3px;padding:4px 8px;cursor:pointer;font-size:11px">Export</button>
  </div>`;
  html += `</div></div>`;

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail').classList.add('active');
  if (restoreScroll) {
    document.getElementById('edit-list').scrollTop = restoreScroll.main || 0;
    document.getElementById('edit-list-ex').scrollTop = restoreScroll.ex || 0;
  }
}

function cardRow(idx, i, c) {
  return `<div data-num="${c.number}" style="display:flex;align-items:center;gap:2px;padding:2px 0;border-bottom:1px solid #2a3a4a;font-size:11px">
    <button onclick="editCard(${idx},${i},-1)" style="background:#633;color:#fff;border:none;border-radius:2px;width:18px;height:18px;cursor:pointer;font-size:10px">-</button>
    <span style="width:14px;text-align:center">${c.count}</span>
    <button onclick="editCard(${idx},${i},1)" style="background:#363;color:#fff;border:none;border-radius:2px;width:18px;height:18px;cursor:pointer;font-size:10px">+</button>
    <span style="flex:1;color:#8cf">${c.number}</span>
    <button onclick="removeCard(${idx},${i})" style="background:none;color:#f66;border:none;cursor:pointer;font-size:12px">×</button>
  </div>`;
}

function getEditCards(idx) {
  const r = filtered[idx];
  const edits = JSON.parse(localStorage.getItem('chaos_recipe_edits') || '{}');
  return edits[r.id] ? edits[r.id].cards : [...r.cards];
}

function saveEditState(idx, cards) {
  const r = filtered[idx];
  const edits = JSON.parse(localStorage.getItem('chaos_recipe_edits') || '{}');
  edits[r.id] = { cards };
  localStorage.setItem('chaos_recipe_edits', JSON.stringify(edits));
}

function editCard(idx, ci, delta) {
  const row = event.target.closest('[data-num]');
  const el = row.querySelector('span');
  let val = parseInt(el.textContent) + delta;
  if (val < 0) val = 0;
  el.textContent = val;
  el.style.color = '#ff0'; el.style.fontWeight = 'bold';
  setTimeout(() => { el.style.color = ''; el.style.fontWeight = ''; }, 600);
  updateCounts();
}

function removeCard(idx, ci) {
  event.target.closest('[data-num]').remove();
  updateCounts();
}

function updateCounts() {
  let mainT = 0, exT = 0;
  document.querySelectorAll('#edit-list [data-num]').forEach(r => { mainT += parseInt(r.querySelector('span').textContent) || 0; });
  document.querySelectorAll('#edit-list-ex [data-num]').forEach(r => { exT += parseInt(r.querySelector('span').textContent) || 0; });
  const mc = document.getElementById('main-count');
  const ec = document.getElementById('ex-count');
  if (mc) { mc.textContent = mainT+'/50'; mc.style.color = mainT===50?'#4c8':mainT>50?'#e55':'#da4'; }
  if (ec) { ec.textContent = exT+'/10'; ec.style.color = exT===10?'#4c8':exT>10?'#e55':'#da4'; }
}

function addCard(idx) {
  let num = document.getElementById('add-num').value.trim();
  const cnt = parseInt(document.getElementById('add-cnt').value) || 1;
  if (!num) return;
  // Case-insensitive lookup
  if (!cardMap[num]) {
    const upper = num.toUpperCase();
    const found = Object.keys(cardMap).find(k => k.toUpperCase() === upper);
    if (found) num = found;
  }
  // Check if already in list
  const existing = document.querySelector(`[data-num="${num}"]`);
  if (existing) {
    const span = existing.querySelector('span');
    span.textContent = parseInt(span.textContent) + cnt;
    span.style.color = '#ff0'; span.style.fontWeight = 'bold';
    setTimeout(() => { span.style.color = ''; span.style.fontWeight = ''; }, 600);
  } else {
    const info = cardMap[num] || {};
    const target = info.type === 'extra' ? 'edit-list-ex' : 'edit-list';
    document.getElementById(target).insertAdjacentHTML('beforeend',
      `<div data-num="${num}" style="display:flex;align-items:center;gap:2px;padding:2px 0;border-bottom:1px solid #2a3a4a;font-size:11px">
        <button onclick="editCard(${idx},0,-1)" style="background:#633;color:#fff;border:none;border-radius:2px;width:18px;height:18px;cursor:pointer;font-size:10px">-</button>
        <span style="width:14px;text-align:center">${cnt}</span>
        <button onclick="editCard(${idx},0,1)" style="background:#363;color:#fff;border:none;border-radius:2px;width:18px;height:18px;cursor:pointer;font-size:10px">+</button>
        <span style="flex:1;color:#8cf">${num}</span>
        <button onclick="this.closest('[data-num]').remove();updateCounts()" style="background:none;color:#f66;border:none;cursor:pointer;font-size:12px">×</button>
      </div>`);
  }
  document.getElementById('add-num').value = '';
  updateCounts();
}

function saveEdit(idx) {
  // Read current state from DOM
  const cards = [];
  document.querySelectorAll('#edit-list [data-num], #edit-list-ex [data-num]').forEach(row => {
    const num = row.dataset.num;
    const count = parseInt(row.querySelector('span').textContent) || 0;
    if (count > 0) cards.push({ number: num, count });
  });
  // Also include added cards from add input
  const r = filtered[idx];
  const edits = JSON.parse(localStorage.getItem('chaos_recipe_edits') || '{}');
  edits[r.id] = { cards };
  localStorage.setItem('chaos_recipe_edits', JSON.stringify(edits));
  alert('保存しました');
}

function resetEdit(idx) {
  const r = filtered[idx];
  const edits = JSON.parse(localStorage.getItem('chaos_recipe_edits') || '{}');
  delete edits[r.id];
  localStorage.setItem('chaos_recipe_edits', JSON.stringify(edits));
  showDetail(idx);
}

function exportEdits() {
  const edits = JSON.parse(localStorage.getItem('chaos_recipe_edits') || '{}');
  const count = Object.keys(edits).length;
  if (!count) { alert('修正データなし'); return; }
  const blob = new Blob([JSON.stringify(edits, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'recipe_edits.json';
  a.click();
  alert(`${count}件の修正をエクスポートしました`);
}

function closeDetail() { document.getElementById('detail').classList.remove('active'); }

function importDeck(idx) {
  const r = filtered[idx];
  const decks = JSON.parse(localStorage.getItem('chaos_decks') || '[]');
  decks.push({ name: `${r.year} ${r.event_type} ${r.location} #${r.rank}`, partner: r.partner, cards: r.cards });
  localStorage.setItem('chaos_decks', JSON.stringify(decks));
  alert('デッキをインポートしました');
}

init();
</script>
</body>
</html>
