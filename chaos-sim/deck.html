<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChaosTCG デッキ作成</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a2332; color: #e8f0ff; font-family: sans-serif; font-size: 13px; }
header { background: #0f1a26; padding: 8px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #2a3a4a; }
header h1 { font-size: 16px; color: #4a9fd4; }
header nav a { color: #4a9fd4; text-decoration: none; font-size: 12px; margin-right: 12px; }
.container { display: flex; height: calc(100vh - 40px); }

/* Left: search */
.search-panel { width: 360px; border-right: 1px solid #2a3a4a; display: flex; flex-direction: column; }
.search-bar { padding: 8px; display: flex; gap: 4px; }
.search-bar input { flex: 1; background: #0f1a26; border: 1px solid #3a5a6a; border-radius: 4px; padding: 6px 8px; color: #e8f0ff; font-size: 12px; }
.search-bar button { background: #4a9fd4; color: #fff; border: none; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
.search-results { flex: 1; overflow-y: auto; padding: 4px; }
.search-results .card-item { display: flex; align-items: center; gap: 6px; padding: 4px; border-bottom: 1px solid #1a2a3a; cursor: pointer; }
.search-results .card-item:hover { background: #1e2e3e; }
.search-results .card-item img { width: 36px; height: 50px; object-fit: cover; border-radius: 2px; }
.search-results .card-item .info { flex: 1; min-width: 0; }
.search-results .card-item .num { font-size: 11px; color: #8ab; }
.search-results .card-item .name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-results .card-item .add-btn { background: #2a9d4a; color: #fff; border: none; border-radius: 3px; padding: 2px 8px; cursor: pointer; font-size: 11px; }

/* Right: deck */
.deck-panel { flex: 1; display: flex; flex-direction: column; }
.deck-header { padding: 8px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #2a3a4a; }
.deck-header input { background: #0f1a26; border: 1px solid #3a5a6a; border-radius: 4px; padding: 4px 8px; color: #e8f0ff; font-size: 12px; width: 200px; }
.deck-header select { background: #0f1a26; border: 1px solid #3a5a6a; border-radius: 4px; padding: 4px; color: #e8f0ff; font-size: 12px; }
.deck-header button { background: #4a9fd4; color: #fff; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 11px; }
.deck-header .del-btn { background: #d44a4a; }
.deck-stats { padding: 4px 8px; font-size: 11px; color: #8ab; border-bottom: 1px solid #1a2a3a; }
.deck-list { flex: 1; overflow-y: auto; padding: 4px; }
.deck-section { margin-bottom: 8px; }
.deck-section h4 { font-size: 11px; color: #4a9fd4; padding: 2px 4px; background: #0f1a26; border-radius: 3px; margin-bottom: 2px; }
.deck-list .card-row { display: flex; align-items: center; gap: 6px; padding: 3px 4px; border-bottom: 1px solid #0f1a26; }
.deck-list .card-row:hover { background: #1e2e3e; }
.deck-list .card-row img { width: 30px; height: 42px; object-fit: cover; border-radius: 2px; }
.deck-list .card-row .info { flex: 1; min-width: 0; }
.deck-list .card-row .num { font-size: 10px; color: #8ab; }
.deck-list .card-row .name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-list .card-row .controls { display: flex; align-items: center; gap: 3px; }
.deck-list .card-row .controls button { width: 20px; height: 20px; border: 1px solid #3a5a6a; background: #1e2e3e; color: #e8f0ff; border-radius: 3px; cursor: pointer; font-size: 12px; }
.deck-list .card-row .controls span { min-width: 14px; text-align: center; }
.deck-list .card-row .partner-mark { color: #d4a04a; font-size: 10px; font-weight: bold; }
</style>
</head>
<body>
<header>
  <h1>デッキ作成</h1>
  <nav><a href="index.html">シミュレータ</a><a href="recipe.html">レシピDB</a></nav>
</header>
<div class="container">
  <div class="search-panel">
    <div class="search-bar">
      <select id="os-filter" onchange="search()"><option value="">全OS</option></select>
      <input id="q" placeholder="カード番号 or 名前" onkeydown="if(event.key==='Enter')search()">
      <button onclick="search()">検索</button>
    </div>
    <div class="search-results" id="results"></div>
  </div>
  <div class="deck-panel">
    <div class="deck-header">
      <input id="deck-name" placeholder="デッキ名">
      <select id="deck-load" onchange="loadDeck()"><option value="">-- 読込 --</option></select>
      <button onclick="saveDeck()">保存</button>
      <button onclick="newDeck()">新規</button>
      <button class="del-btn" onclick="deleteDeck()">削除</button>
    </div>
    <div class="deck-stats" id="stats">メイン: 0/50 | EX: 0/10</div>
    <div class="deck-list" id="deck-list"></div>
  </div>
</div>
<script>
let cardMap = {};
let deck = { name: '', partner: '', cards: [] }; // cards: [{number, count}]

fetch('card_map.json').then(r=>r.json()).then(d=>{ cardMap = d; populateLoad(); populateOsList(); });

function populateOsList() {
  const osSet = new Set();
  for (const info of Object.values(cardMap)) { if (info.os) osSet.add(info.os); }
  const sorted = [...osSet].sort();
  const sel = document.getElementById('os-filter');
  sel.innerHTML = '<option value="">全OS</option>' + sorted.map(o => `<option value="${o}">${o}</option>`).join('');
}

function search() {
  const q = document.getElementById('q').value.trim().toUpperCase();
  const os = document.getElementById('os-filter').value;
  const results = [];
  for (const [num, info] of Object.entries(cardMap)) {
    if (os && info.os !== os) continue;
    if (q && !num.toUpperCase().includes(q) && !(info.name && info.name.toUpperCase().includes(q))) continue;
    results.push({ number: num, ...info });
    if (results.length >= 100) break;
  }
  const el = document.getElementById('results');
  el.innerHTML = results.map(c => `<div class="card-item">
    <img src="${c.image}" loading="lazy">
    <div class="info"><div class="num">${c.number}</div><div class="name">${c.name||''}</div></div>
    <button class="add-btn" onclick="addCard('${c.number}')">+</button>
  </div>`).join('');
}

function addCard(num) {
  const existing = deck.cards.find(c => c.number === num);
  if (existing) { if (existing.count < 4) existing.count++; }
  else deck.cards.push({ number: num, count: 1 });
  renderDeck();
}

function removeCard(num) {
  const i = deck.cards.findIndex(c => c.number === num);
  if (i < 0) return;
  deck.cards[i].count--;
  if (deck.cards[i].count <= 0) deck.cards.splice(i, 1);
  if (deck.partner === num && !deck.cards.find(c => c.number === num)) deck.partner = '';
  renderDeck();
}

function setPartner(num) {
  deck.partner = deck.partner === num ? '' : num;
  renderDeck();
}

function isExtra(num) {
  const info = cardMap[num];
  if (info && info.type === 'extra') return true;
  return num.toUpperCase().includes('EX') || num.toUpperCase().endsWith('SP');
}

function renderDeck() {
  const main = deck.cards.filter(c => !isExtra(c.number));
  const extra = deck.cards.filter(c => isExtra(c.number));
  const mainTotal = main.reduce((s,c) => s + c.count, 0);
  const extraTotal = extra.reduce((s,c) => s + c.count, 0);
  document.getElementById('stats').textContent = `メイン: ${mainTotal}/50 | EX: ${extraTotal}/10 | パートナー: ${deck.partner || '未設定'}`;

  const renderSection = (title, cards) => {
    if (!cards.length) return '';
    let html = `<div class="deck-section"><h4>${title} (${cards.reduce((s,c)=>s+c.count,0)})</h4>`;
    for (const c of cards) {
      const info = cardMap[c.number] || {};
      const isP = deck.partner === c.number;
      html += `<div class="card-row">
        <img src="${info.image||''}" loading="lazy">
        <div class="info"><div class="num">${c.number} ${isP?'<span class="partner-mark">★P</span>':''}</div><div class="name">${info.name||''}</div></div>
        <div class="controls">
          <button onclick="removeCard('${c.number}')">−</button>
          <span>${c.count}</span>
          <button onclick="addCard('${c.number}')">+</button>
          <button onclick="setPartner('${c.number}')" title="パートナー指定" style="${isP?'color:#d4a04a':''}">★</button>
        </div>
      </div>`;
    }
    return html + '</div>';
  };
  document.getElementById('deck-list').innerHTML = renderSection('メインデッキ', main) + renderSection('エクストラデッキ', extra);
}

// Save/Load
function getDecks() { return JSON.parse(localStorage.getItem('chaos_decks') || '[]'); }

function saveDeck() {
  const name = document.getElementById('deck-name').value.trim() || 'デッキ' + Date.now();
  deck.name = name;
  const decks = getDecks();
  const idx = decks.findIndex(d => d.name === name);
  const entry = { name, partner: deck.partner, cards: deck.cards };
  if (idx >= 0) decks[idx] = entry; else decks.push(entry);
  localStorage.setItem('chaos_decks', JSON.stringify(decks));
  populateLoad();
  alert('保存しました');
}

function loadDeck() {
  const sel = document.getElementById('deck-load');
  const name = sel.value;
  if (!name) return;
  const decks = getDecks();
  const d = decks.find(x => x.name === name);
  if (!d) return;
  deck = { name: d.name, partner: d.partner || '', cards: [...(d.cards||[])] };
  document.getElementById('deck-name').value = d.name;
  renderDeck();
}

function newDeck() {
  deck = { name: '', partner: '', cards: [] };
  document.getElementById('deck-name').value = '';
  document.getElementById('deck-load').value = '';
  renderDeck();
}

function deleteDeck() {
  const name = document.getElementById('deck-name').value.trim();
  if (!name || !confirm(`"${name}" を削除しますか？`)) return;
  const decks = getDecks().filter(d => d.name !== name);
  localStorage.setItem('chaos_decks', JSON.stringify(decks));
  newDeck();
  populateLoad();
}

function populateLoad() {
  const decks = getDecks();
  const sel = document.getElementById('deck-load');
  sel.innerHTML = '<option value="">-- 読込 --</option>' + decks.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
}
</script>
</body>
</html>
